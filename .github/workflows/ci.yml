name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check minimal feature sets
        run: |
          cargo check -p better-fetch --no-default-features --features json,rustls-tls
          cargo check -p better-fetch --no-default-features --features json,native-tls
          cargo check -p better-fetch --no-default-features --features multipart,rustls-tls

      - name: Tests
        run: cargo test --all-features

      - name: Tests (schema-validate feature)
        run: cargo test -p better-fetch --features schema-validate,json,rustls-tls
